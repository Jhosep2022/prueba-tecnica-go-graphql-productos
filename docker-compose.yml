services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: prueba-tecnica-go-graphql-productos:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
